services:
  ctfagent:
    build: .
    image: ctfagent:latest
    container_name: ctfagent
    stdin_open: true
    tty: true
    environment:
      CTFAGENT_DOCKER: "1"
      CTFAGENT_ENV_FILE: /app/data/.env
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    ports:
      - "8000:8000"
    command: ["python", "run.py", "--docker"]
    profiles: ["cli"]

  api:
    build: .
    image: ctfagent:latest
    container_name: ctfagent-api
    environment:
      CTFAGENT_DOCKER: "1"
      CTFAGENT_ENV_FILE: /app/data/.env
    ports:
      - "8000:8000"
    command: ["python", "run.py", "--docker-api"]
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
      - /var/run/docker.sock:/var/run/docker.sock
    profiles: ["api"]
