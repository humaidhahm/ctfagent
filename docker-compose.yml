version: "3.9"
services:
  ctfagent:
    build: .
    image: ctfagent:latest
    container_name: ctfagent
    stdin_open: true
    tty: true
    env_file: .env
    volumes:
      - ./uploads:/app/uploads
      - /usr/share/wordlists:/usr/share/wordlists:ro
    ports:
      - "8000:8000"
    command: ["python", "-m", "cli.client"]
    profiles: ["cli"]

  api:
    build: .
    image: ctfagent:latest
    container_name: ctfagent-api
    env_file: .env
    ports:
      - "8000:8000"
    command: >
      sh -c "cd /app && python -c 'from backend.main import app; import uvicorn; uvicorn.run(app, host=\"0.0.0.0\", port=8000)'"
    volumes:
      - ./uploads:/app/uploads
      - /var/run/docker.sock:/var/run/docker.sock
    profiles: ["api"]
