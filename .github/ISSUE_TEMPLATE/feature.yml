name: Feature Request
description: Suggest a new feature or improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem would this feature solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this to work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What alternatives have you considered?
  - type: dropdown
    id: domain
    attributes:
      label: Domain
      description: Which domain does this affect?
      options:
        - Web
        - Crypto
        - Forensics
        - Pwn
        - Reverse Engineering
        - OSINT
        - General / Core
        - Documentation
