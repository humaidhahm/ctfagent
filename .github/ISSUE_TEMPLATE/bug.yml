name: Bug Report
description: Report a bug or unexpected behavior
labels: [bug]
body:
  - type: input
    id: version
    attributes:
      label: CTFAgent Version
      description: What version are you running? (or commit hash)
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction Steps
      description: How can we reproduce this?
      placeholder: |
        1. Run '...'
        2. Enter '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        Examples:
          - OS: Kali Linux 2024.1
          - Python: 3.11.9
          - NVIDIA NIM model: meta/llama-3.1-70b-instruct
      render: yaml
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant Log Output
      description: Copy and paste relevant log output (/tmp/ctfagent.log)
      render: shell
